<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚔️ Clash Royale - Premium Architecture</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; background: linear-gradient(135deg, #1a1f3a 0%, #0f1729 50%, #1a1f3a 100%); }
    #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    
    /* Animations */
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); } 50% { box-shadow: 0 0 40px rgba(255, 215, 0, 1); } }
    @keyframes card-spawn { 0% { transform: scale(0.7) rotateY(90deg); opacity: 0; } 100% { transform: scale(1) rotateY(0deg); opacity: 1; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes victory-popup { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes damage-pop { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(0.5) translateY(-40px); opacity: 0; } }
    @keyframes card-lift { 0% { transform: translateY(0); } 100% { transform: translateY(-12px); } }
    @keyframes drag-float { 0%, 100% { box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(147, 51, 234, 0.6); } 50% { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 40px rgba(147, 51, 234, 0.8); } }
    @keyframes valid-glow { 0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4), inset 0 0 20px rgba(34, 197, 94, 0.2); } 50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.6), inset 0 0 30px rgba(34, 197, 94, 0.3); } }
    @keyframes invalid-pulse { 0%, 100% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); } 50% { border-color: rgba(239, 68, 68, 1); box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); } }
    @keyframes cycle-indicator { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
    @keyframes phase-pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes water-flow { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }
    @keyframes bridge-glow { 0%, 100% { box-shadow: 0 0 15px rgba(139, 69, 19, 0.3); } 50% { box-shadow: 0 0 25px rgba(210, 180, 140, 0.5); } }
    
    .water-flow { animation: water-flow 8s linear infinite; }
    .bridge-glow { animation: bridge-glow 3s ease-in-out infinite; }
    
    /* Medieval Theme - Stone/Castle Textures */
    .medieval-stone {
      background: linear-gradient(135deg, #6b5d52 0%, #8b7355 25%, #6b5d52 50%, #7a6e65 75%, #6b5d52 100%);
      background-size: 100px 100px;
      position: relative;
    }
    
    .stone-texture::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><defs><pattern id="stone" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="40" height="40" fill="rgba(0,0,0,0.1)"/><path d="M0,0 L40,40" stroke="rgba(0,0,0,0.08)" stroke-width="1"/><path d="M40,0 L0,40" stroke="rgba(0,0,0,0.08)" stroke-width="1"/></pattern></defs><rect width="200" height="200" fill="url(%23stone)"/></svg>') repeat;
      pointer-events: none;
      opacity: 0.3;
    }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .card-spawn { animation: card-spawn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .shake { animation: shake 0.3s ease-in-out; }
    .victory-popup { animation: victory-popup 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .damage-number { animation: damage-pop 1.5s ease-out forwards; }
    .card-lift { animation: card-lift 0.3s ease-in-out; }
    .drag-float { animation: drag-float 0.6s ease-in-out infinite; }
    .valid-zone { animation: valid-glow 1s ease-in-out infinite; }
    .invalid-zone { animation: invalid-pulse 0.6s ease-in-out; }
    .cycle-pulse { animation: cycle-indicator 1.2s ease-in-out infinite; }
    .phase-indicator-pulse { animation: phase-pulse 1.5s ease-in-out infinite; }
    
    /* Dark Fantasy Theme - Enhanced Rarity Colors */
    .rarity-common { background: linear-gradient(135deg, #6B4423 0%, #C9A961 100%); border-color: #E8D5B7; color: #FFF; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
    .rarity-rare { background: linear-gradient(135deg, #1E5F9E 0%, #4A9FD8 100%); border-color: #6EB5E8; color: #FFF; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
    .rarity-epic { background: linear-gradient(135deg, #6B2D7F 0%, #A855F7 100%); border-color: #D4AAFF; color: #FFF; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
    .rarity-legendary { background: linear-gradient(135deg, #B8860B 0%, #FF8C00 100%); border-color: #FFB84D; color: #000; text-shadow: 1px 1px 2px rgba(255,255,255,0.4); box-shadow: 0 0 30px rgba(255, 165, 0, 0.9), inset 0 0 20px rgba(255, 215, 0, 0.3); }
    
    /* Clash Royale Hand Container */
    .hand-container {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 10px 12px 12px;
      background: linear-gradient(180deg, #3d2910 0%, #2a1a08 40%, #1f1206 100%);
      border-top: 3px solid #8B6914;
      position: relative;
    }

    /* Next card preview (small, on the left) */
    .next-card-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 52px;
      min-height: 72px;
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 8px;
      background: rgba(0,0,0,0.4);
      margin-right: 10px;
      opacity: 0.85;
      flex-shrink: 0;
      position: relative;
      cursor: default;
    }

    .next-card-preview::before {
      content: 'NEXT';
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      font-weight: 800;
      color: rgba(255,215,0,0.8);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .next-card-preview .hand-card-emoji {
      font-size: 22px;
      margin-bottom: 2px;
    }

    .next-card-preview .hand-card-cost {
      font-size: 11px;
    }

    /* Main 4-card hand slots */
    .hand-cards-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      flex: 1;
    }

    /* Hand Card Styles */
    .hand-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      border: 2px solid;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: linear-gradient(135deg, rgba(55, 65, 81, 0.9) 0%, rgba(31, 41, 55, 0.95) 100%);
      user-select: none;
      overflow: visible;
      min-height: 95px;
    }
    
    .hand-card:hover:not(.cannot-play) {
      transform: translateY(-12px) scale(1.05);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(147, 51, 234, 0.5);
    }
    
    .hand-card.dragging {
      opacity: 0.4;
      filter: grayscale(100%);
      cursor: grabbing;
    }
    
    .hand-card.can-play {
      cursor: grab;
    }
    
    .hand-card.cannot-play {
      opacity: 0.5;
      cursor: not-allowed;
      border-color: rgba(107, 114, 128, 0.5) !important;
    }
    
    .hand-card-emoji {
      font-size: 32px;
      line-height: 1;
      margin-bottom: 4px;
      display: block;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .hand-card-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.2;
      text-align: center;
      margin-bottom: 4px;
      color: #fff;
    }
    
    .hand-card-cost {
      font-size: 13px;
      font-weight: 800;
      color: #FCD34D;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    
    .hand-card-rarity {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }
    
    /* Drag Ghost */
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.85;
    }
    
    /* Drop Zone Indicators */
    .drop-zone {
      position: absolute;
      pointer-events: none;
      border: 3px dashed rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    
    .drop-zone.valid {
      border-color: rgba(34, 197, 94, 0.8);
      background: radial-gradient(circle at center, rgba(34, 197, 94, 0.1) 0%, transparent 70%);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.4), inset 0 0 20px rgba(34, 197, 94, 0.1);
    }
    
    .drop-zone.invalid {
      border-color: rgba(239, 68, 68, 0.6);
      background: radial-gradient(circle at center, rgba(239, 68, 68, 0.08) 0%, transparent 70%);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
    }
    
    /* Cycle Indicator */
    .cycle-indicator {
      position: absolute;
      bottom: 8px;
      left: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3B82F6;
      border: 1px solid #93C5FD;
    }
    
    .cycle-indicator.active {
      background: #10B981;
      border-color: #6EE7B7;
      animation: cycle-pulse 1.2s ease-in-out infinite;
    }
    
    /* Timer Display */
    .timer-display {
      font-variant-numeric: tabular-nums;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
    }
    
    .timer-early {
      color: #fbbf24;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
    }
    
    .timer-mid {
      color: #fb923c;
      text-shadow: 0 0 10px rgba(251, 146, 60, 0.5), 0 0 20px rgba(251, 146, 60, 0.3);
    }
    
    .timer-late {
      color: #ef4444;
      text-shadow: 0 0 15px rgba(239, 68, 68, 0.8), 0 0 30px rgba(239, 68, 68, 0.5);
      animation: pulse-glow 1s ease-in-out infinite;
    }
    
    .timer-final {
      color: #dc2626;
      text-shadow: 0 0 20px rgba(220, 38, 38, 0.9), 0 0 40px rgba(220, 38, 38, 0.6);
      animation: pulse-glow 0.5s ease-in-out infinite;
    }
    
    /* Phase Indicator Badge */
    .phase-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid;
    }
    
    .phase-badge.early {
      background: rgba(251, 191, 36, 0.1);
      border-color: #fbbf24;
      color: #fcd34d;
    }
    
    .phase-badge.mid {
      background: rgba(251, 146, 60, 0.1);
      border-color: #fb923c;
      color: #fdba74;
      animation: phase-indicator-pulse 1.5s ease-in-out infinite;
    }
    
    .phase-badge.late {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
      color: #fca5a5;
      animation: phase-indicator-pulse 1s ease-in-out infinite;
    }
    
    /* Elixir Regen Indicator */
    .elixir-regen-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    
    .elixir-regen-early {
      color: #a3e635;
      opacity: 0.7;
    }
    
    .elixir-regen-mid {
      color: #fbbf24;
      opacity: 0.85;
    }
    
    .elixir-regen-late {
      color: #ef4444;
      opacity: 1;
      animation: phase-indicator-pulse 1s ease-in-out infinite;
    }
    
    /* Responsive Design */
    @media (max-width: 768px) {
      .hand-container {
        padding: 8px 10px 10px;
        gap: 0;
      }
      .next-card-preview {
        width: 44px;
        min-height: 62px;
        margin-right: 8px;
      }
      .next-card-preview .hand-card-emoji { font-size: 18px; }
      .hand-cards-row { gap: 6px; }
      .hand-card {
        padding: 8px;
        min-height: 85px;
      }
      .hand-card-emoji { font-size: 24px; }
      .hand-card-name { font-size: 10px; }
      .hand-card-cost { font-size: 12px; }
      .timer-display { font-size: 1.5rem; }
    }
    
    @media (max-width: 480px) {
      .hand-container {
        padding: 6px 8px 8px;
        gap: 0;
      }
      .next-card-preview {
        width: 38px;
        min-height: 56px;
        margin-right: 6px;
      }
      .next-card-preview .hand-card-emoji { font-size: 16px; }
      .hand-cards-row { gap: 4px; }
      .hand-card {
        padding: 6px;
        min-height: 75px;
      }
      .hand-card-emoji { font-size: 20px; }
      .hand-card-name { font-size: 9px; }
      .hand-card-cost { font-size: 11px; }
      .timer-display { font-size: 1.25rem; }
    }
    
    /* Tower Styles - Clash Royale Style */
    .tower-king { background: linear-gradient(to bottom, #E74C3C 0%, #C0392B 50%, #A93226 100%); box-shadow: inset 0 2px 5px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.6), 0 0 20px rgba(231, 76, 60, 0.4); position: relative; border: 2px solid #96281B; }
    .tower-king::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%); }
    .tower-princess { background: linear-gradient(to bottom, #3498DB 0%, #2980B9 50%, #1F618D 100%); box-shadow: inset 0 2px 5px rgba(0,0,0,0.4), 0 5px 15px rgba(0,0,0,0.6), 0 0 20px rgba(52, 152, 219, 0.4); border: 2px solid #1A5276; }
    .tower-princess::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React

const CARDS = {
  knight: { id: 'knight', name: 'Knight', emoji: '🛡️', elixirCost: 3, rarity: 'common', type: 'troop', stats: { hp: 600, damage: 100, speed: 1, range: 50, attackSpeed: 1, flying: false } },
  archer: { id: 'archer', name: 'Archer', emoji: '🏹', elixirCost: 3, rarity: 'common', type: 'troop', stats: { hp: 200, damage: 120, speed: 1.2, range: 120, attackSpeed: 1.2, flying: false } },
  giant: { id: 'giant', name: 'Giant', emoji: '👹', elixirCost: 5, rarity: 'rare', type: 'troop', stats: { hp: 1800, damage: 60, speed: 0.7, range: 50, attackSpeed: 1.5, targetBuildings: true, flying: false } },
  fireball: { id: 'fireball', name: 'Fireball', emoji: '🔥', elixirCost: 4, rarity: 'rare', type: 'spell', stats: { damage: 400, splashRadius: 120 } },
  arrows: { id: 'arrows', name: 'Arrows', emoji: '⬆️', elixirCost: 3, rarity: 'common', type: 'spell', stats: { damage: 200, splashRadius: 150 } },
  minions: { id: 'minions', name: 'Minions', emoji: '👿', elixirCost: 3, rarity: 'common', type: 'troop', stats: { hp: 100, damage: 80, speed: 1.4, range: 100, attackSpeed: 1, flying: true, count: 3 } },
  skeletonArmy: { id: 'skeletonArmy', name: 'Skeleton Army', emoji: '💀', elixirCost: 2, rarity: 'rare', type: 'troop', stats: { hp: 60, damage: 40, speed: 1.3, range: 40, attackSpeed: 0.8, count: 12, flying: false } },
  babyDragon: { id: 'babyDragon', name: 'Baby Dragon', emoji: '🐉', elixirCost: 4, rarity: 'rare', type: 'troop', stats: { hp: 800, damage: 120, speed: 0.9, range: 100, attackSpeed: 1.2, flying: true, splashRadius: 80 } },
  valkyrie: { id: 'valkyrie', name: 'Valkyrie', emoji: '⚔️', elixirCost: 4, rarity: 'rare', type: 'troop', stats: { hp: 900, damage: 130, speed: 0.9, range: 50, attackSpeed: 1.3, splashRadius: 100, flying: false } },
  musketeer: { id: 'musketeer', name: 'Musketeer', emoji: '🤠', elixirCost: 4, rarity: 'rare', type: 'troop', stats: { hp: 400, damage: 160, speed: 0.95, range: 140, attackSpeed: 1, flying: false } },
  hogRider: { id: 'hogRider', name: 'Hog Rider', emoji: '🐗', elixirCost: 4, rarity: 'epic', type: 'troop', stats: { hp: 500, damage: 150, speed: 1.5, range: 50, attackSpeed: 1.2, targetBuildings: true, flying: false } },
  witch: { id: 'witch', name: 'Witch', emoji: '🧙‍♀️', elixirCost: 5, rarity: 'epic', type: 'troop', stats: { hp: 500, damage: 100, speed: 0.85, range: 100, attackSpeed: 1.2, flying: false } },
  pekka: { id: 'pekka', name: 'P.E.K.K.A', emoji: '🤖', elixirCost: 7, rarity: 'legendary', type: 'troop', stats: { hp: 2000, damage: 300, speed: 0.6, range: 60, attackSpeed: 1.8, flying: false } },
  bombTower: { id: 'bombTower', name: 'Bomb Tower', emoji: '💣', elixirCost: 5, rarity: 'rare', type: 'building', stats: { hp: 700, damage: 200, range: 130, attackSpeed: 1.2, splashRadius: 100 } },
  cannon: { id: 'cannon', name: 'Cannon', emoji: '🔫', elixirCost: 3, rarity: 'common', type: 'building', stats: { hp: 400, damage: 150, range: 100, attackSpeed: 1 } },
  freeze: { id: 'freeze', name: 'Freeze Spell', emoji: '❄️', elixirCost: 4, rarity: 'epic', type: 'spell', stats: { splashRadius: 120, freezeDuration: 2000 } },
}

const CARD_ARRAY = Object.values(CARDS)
const ARENA_WIDTH = 600
const ARENA_HEIGHT = 800

// MEDIEVAL BRIDGE SYSTEM - CRITICAL FOR UNIT MOVEMENT (HORIZONTAL RIVER)
const BRIDGES = {
  left: { y1: 360, y2: 440, x: 60, width: 100 },     // Left bridge (vertical, crossing horizontal river)
  right: { y1: 360, y2: 440, x: 440, width: 100 },   // Right bridge (vertical, crossing horizontal river)
}

const RIVER_TOP = 360
const RIVER_BOTTOM = 440
const RIVER_HEIGHT = RIVER_BOTTOM - RIVER_TOP  // 80px horizontal river

const LANE_WIDTH = ARENA_WIDTH / 2
const INITIAL_TOWER_HP = { king: 3500, princess: 1800 }

// TIMER CONSTANTS - CRITICAL
const TOTAL_GAME_TIME_SEC = 180  // 3 minutes
const EARLY_PHASE_END_SEC = 120   // Early: 180-120s
const MID_PHASE_END_SEC = 60      // Mid: 120-60s
const LATE_PHASE_START_SEC = 60   // Late: 60-0s

// ELIXIR GENERATION - CRITICAL
const ELIXIR_BASE_RATE = 0.5      // 0.5 Elixir per second = 10s to fill 1 elixir
const ELIXIR_MAX = 10.0

// PHASE ELIXIR MULTIPLIERS
const ELIXIR_MULTIPLIERS = {
  early: 1.0,  // 180-120s: 1x rate (normal)
  mid: 1.0,    // 120-60s: 1x rate (normal)
  late: 2.0,   // 60-0s: 2x rate (double)
}

const findNearestEnemy = (unit, enemies, towers) => {
  let nearest = null, minDist = Infinity
  const range = unit.card?.stats?.range || unit.stats?.range || 100
  const targetsBuildings = unit.card?.stats?.targetBuildings || unit.stats?.targetBuildings
  if (targetsBuildings && enemies.buildings) {
    enemies.buildings.forEach(b => {
      if (b && b.hp > 0) {
        const dist = Math.hypot((b.x || 0) - (unit.x || 0), (b.y || 0) - (unit.y || 0))
        if (dist < range && dist < minDist) { nearest = b; minDist = dist; }
      }
    })
  }
  if (targetsBuildings && towers) {
    towers.forEach(t => {
      if (t && t.hp > 0) {
        const dist = Math.hypot((t.x || 0) - (unit.x || 0), (t.y || 0) - (unit.y || 0))
        if (dist < range && dist < minDist) { nearest = t; minDist = dist; }
      }
    })
  }
  if (!targetsBuildings && enemies.troops) {
    enemies.troops.forEach(t => {
      if (t && t.hp > 0) {
        const dist = Math.hypot((t.x || 0) - (unit.x || 0), (t.y || 0) - (unit.y || 0))
        if (dist < range && dist < minDist) { nearest = t; minDist = dist; }
      }
    })
  }
  if (!targetsBuildings && !nearest) {
    if (enemies.buildings) {
      enemies.buildings.forEach(b => {
        if (b && b.hp > 0) {
          const dist = Math.hypot((b.x || 0) - (unit.x || 0), (b.y || 0) - (unit.y || 0))
          if (dist < range && dist < minDist) { nearest = b; minDist = dist; }
        }
      })
    }
    if (towers) {
      towers.forEach(t => {
        if (t && t.hp > 0) {
          const dist = Math.hypot((t.x || 0) - (unit.x || 0), (t.y || 0) - (unit.y || 0))
          if (dist < range && dist < minDist) { nearest = t; minDist = dist; }
        }
      })
    }
  }
  return nearest
}

// Find nearest enemy for movement (no range limit) - units always walk toward a target
const findMovementTarget = (unit, enemies, towers) => {
  let nearest = null, minDist = Infinity
  const targetsBuildings = unit.card?.stats?.targetBuildings || unit.stats?.targetBuildings

  // Building-targeting units (Giant, Hog Rider): walk toward nearest tower or placed building, ignore troops
  if (targetsBuildings) {
    if (towers) {
      towers.forEach(t => {
        if (t && t.hp > 0) {
          const dist = Math.hypot((t.x || 0) - (unit.x || 0), (t.y || 0) - (unit.y || 0))
          if (dist < minDist) { nearest = t; minDist = dist; }
        }
      })
    }
    if (enemies.buildings) {
      enemies.buildings.forEach(b => {
        if (b && b.hp > 0) {
          const dist = Math.hypot((b.x || 0) - (unit.x || 0), (b.y || 0) - (unit.y || 0))
          if (dist < minDist) { nearest = b; minDist = dist; }
        }
      })
    }
    return nearest
  }

  // Regular units: nearest troop first
  if (enemies.troops) {
    enemies.troops.forEach(t => {
      if (t && t.hp > 0) {
        const dist = Math.hypot((t.x || 0) - (unit.x || 0), (t.y || 0) - (unit.y || 0))
        if (dist < minDist) { nearest = t; minDist = dist; }
      }
    })
  }
  // Then placed buildings
  if (enemies.buildings) {
    enemies.buildings.forEach(b => {
      if (b && b.hp > 0) {
        const dist = Math.hypot((b.x || 0) - (unit.x || 0), (b.y || 0) - (unit.y || 0))
        if (dist < minDist) { nearest = b; minDist = dist; }
      }
    })
  }
  // If no troops or buildings, walk toward the nearest alive tower
  if (!nearest && towers) {
    towers.forEach(t => {
      if (t && t.hp > 0) {
        const dist = Math.hypot((t.x || 0) - (unit.x || 0), (t.y || 0) - (unit.y || 0))
        if (dist < minDist) { nearest = t; minDist = dist; }
      }
    })
  }
  return nearest
}

// Helper: Check if unit is flying
const isFlying = (unit) => unit.card?.stats?.flying === true

// Helper: Check if position is in river (horizontal river)
const isInRiver = (y) => y >= RIVER_TOP && y <= RIVER_BOTTOM

const moveUnit = (unit, targetX, targetY, speed = 1) => {
  if (!unit) return false
  
  // Flying units ignore all river restrictions
  if (isFlying(unit)) {
    const dist = Math.hypot(targetX - (unit.x || 0), targetY - (unit.y || 0))
    if (dist < speed) { unit.x = targetX; unit.y = targetY; return true }
    const ratio = speed / Math.max(dist, 0.1)
    unit.x += (targetX - (unit.x || 0)) * ratio
    unit.y += (targetY - (unit.y || 0)) * ratio
    return false
  }
  
  // Ground units: check if need to cross river (horizontal river blocks vertical movement)
  const currentInRiver = unit.y >= RIVER_TOP && unit.y <= RIVER_BOTTOM
  const targetInRiver = targetY >= RIVER_TOP && targetY <= RIVER_BOTTOM
  const currentSide = unit.y < RIVER_TOP ? 'below' : unit.y > RIVER_BOTTOM ? 'above' : 'river'
  const targetSide = targetY < RIVER_TOP ? 'below' : targetY > RIVER_BOTTOM ? 'above' : 'river'
  
  // If already on bridge or crossing, mark as bridge-crossed
  if (!unit.bridgeCrossed && currentInRiver && (currentSide === 'river' || (currentSide !== targetSide && targetSide !== 'river'))) {
    unit.bridgeCrossed = true
  }
  
  // Need to cross river (different sides and target not in river)
  if (!unit.bridgeCrossed && currentSide !== targetSide && targetSide !== 'river') {
    // Route through nearest bridge based on x-position
    const distToLeftBridge = Math.abs(unit.x - BRIDGES.left.x)
    const distToRightBridge = Math.abs(unit.x - BRIDGES.right.x)
    
    const bridgeName = distToLeftBridge < distToRightBridge ? 'left' : 'right'
    const bridge = BRIDGES[bridgeName]
    const bridgeCenterX = bridge.x
    const bridgeCenterY = (bridge.y1 + bridge.y2) / 2
    
    // Move to bridge first
    const distToBridge = Math.hypot(bridgeCenterX - (unit.x || 0), bridgeCenterY - (unit.y || 0))
    if (distToBridge > speed) {
      const ratio = speed / Math.max(distToBridge, 0.1)
      unit.x += (bridgeCenterX - (unit.x || 0)) * ratio
      unit.y += (bridgeCenterY - (unit.y || 0)) * ratio
      return false
    } else {
      // Reached bridge - mark as crossed
      unit.x = bridgeCenterX
      unit.y = bridgeCenterY
      unit.bridgeCrossed = true
      return false
    }
  }
  
  // Normal movement to target
  const dist = Math.hypot(targetX - (unit.x || 0), targetY - (unit.y || 0))
  if (dist < speed) { unit.x = targetX; unit.y = targetY; return true }
  const ratio = speed / Math.max(dist, 0.1)
  unit.x += (targetX - (unit.x || 0)) * ratio
  unit.y += (targetY - (unit.y || 0)) * ratio
  return false
}

/**
 * TIMER FORMATTER - Converts milliseconds to MM:SS format
 * Critical: Ensures consistent display across all phase changes
 */
const formatTime = (totalSeconds) => {
  const minutes = Math.floor(totalSeconds / 60)
  const seconds = totalSeconds % 60
  return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`
}

/**
 * PHASE CALCULATOR - Determines game phase based on remaining time
 * Critical: Must be called AFTER timer update
 */
const calculatePhase = (remainingSeconds) => {
  if (remainingSeconds > EARLY_PHASE_END_SEC) return 'early'
  if (remainingSeconds > MID_PHASE_END_SEC) return 'mid'
  return 'late'
}

/**
 * ELIXIR GENERATION - Calculates elixir regen based on phase
 * deltaMs: Time elapsed since last update (for accurate framerate-independent regen)
 */
const calculateElixirRegen = (phase, deltaMs) => {
  const phaseMultiplier = ELIXIR_MULTIPLIERS[phase] || 1.0
  const baseRegenPerMs = (ELIXIR_BASE_RATE / 1000) // Convert to per-millisecond
  return baseRegenPerMs * phaseMultiplier * deltaMs
}

  useEffect(() => {

      window.removeEventListener('mouseup', handleMouseUp)

      console.warn(`Invalid card: ${cardId}`)
      return
    }

    const elixir = isPlayer ? gs.playerElixir : gs.enemyElixir
    if (elixir < card.elixirCost) return

    if (isPlayer) gs.playerElixir -= card.elixirCost
    else gs.enemyElixir -= card.elixirCost

    const hand = isPlayer ? gs.playerHand : gs.enemyHand
    const handIdx = hand.findIndex(h => h.cardId === cardId)
    if (isPlayer && handIdx >= 0 && gs.playerDeck) {
      // Replace slot with next card from deck (Clash Royale cycling)
      const nextIdx = gs.playerNextDeckIdx % gs.playerDeck.length
      hand[handIdx] = { cardId: gs.playerDeck[nextIdx], id: Math.random() }
      gs.playerNextDeckIdx++
    } else if (!isPlayer && handIdx >= 0) {
      hand.splice(handIdx, 1)
    }

    if (card.type === 'spell') {
      const side = isPlayer ? 'enemy' : 'player'
      const targetTroops = side === 'enemy' ? gs.enemyTroops : gs.playerTroops
      const targetBuildings = side === 'enemy' ? gs.enemyBuildings : gs.playerBuildings

        const centerY = spawnY || (isPlayer ? ARENA_HEIGHT * 0.3 : ARENA_HEIGHT * 0.7)

              setDamageNumbers(prev => [...prev.slice(-50), { x: t.x, y: t.y, damage: 400, id: Math.random() }])
            }

        targetBuildings.forEach(b => {
          if (b && b.hp > 0) {
            const dist = Math.hypot((b.x || 0) - centerX, (b.y || 0) - centerY)
            if (dist < 120) b.hp -= 400
          }
        })
      } else if (cardId === 'arrows') {
        const centerX = spawnX || (isPlayer ? ARENA_WIDTH * 0.75 : ARENA_WIDTH * 0.25)

        targetTroops.forEach(t => {
          if (t && t.hp > 0) {

              setDamageNumbers(prev => [...prev.slice(-50), { x: t.x, y: t.y, damage: 200, id: Math.random() }])
            }
          }
        })

        const centerY = spawnY || (isPlayer ? ARENA_HEIGHT * 0.3 : ARENA_HEIGHT * 0.7)
        targetTroops.forEach(t => {
          if (t && t.hp > 0) {
            const dist = Math.hypot((t.x || 0) - centerX, (t.y || 0) - centerY)
            if (dist < 120) t.frozen = 2000
          }
        })

    } else {

      const spawnYFinal = spawnY || (isPlayer ? ARENA_HEIGHT - 200 : 200)

  }, [selectedDeck])

   * GAME LOOP - 30fps (33ms interval) for consistent physics

   */
  useEffect(() => {

    const gameLoopInterval = setInterval(() => {
      const gs = gameStateRef.current
      const towers = towerStateRef.current
      const nowMs = Date.now()
      
      if (gs.gameOver) return

      // TIMER UPDATE - CRITICAL FOR ACCURACY
      const deltaMs = nowMs - gs.lastUpdateMs
      gs.lastUpdateMs = nowMs
      
      // Decrement timer by delta time in seconds
      gs.gameTimeRemainingSec = Math.max(0, gs.gameTimeRemainingSec - (deltaMs / 1000))
      
      // Check if game should end
      if (gs.gameTimeRemainingSec <= 0) {
        gs.gameTimeRemainingSec = 0
        gs.gameOver = true
        const playerTowerHp = Object.values(towers.player).reduce((sum, t) => sum + t.hp, 0)
        const enemyTowerHp = Object.values(towers.enemy).reduce((sum, t) => sum + t.hp, 0)
        gs.winner = enemyTowerHp < playerTowerHp ? 'player' : enemyTowerHp > playerTowerHp ? 'enemy' : 'tie'
      }

      // UPDATE PHASE - Must be done AFTER timer update
      const newPhase = calculatePhase(Math.floor(gs.gameTimeRemainingSec))
      if (newPhase !== gs.phase) {
        gs.phase = newPhase
      }

      // ELIXIR GENERATION - Phase-based with accurate delta timing
      const playerElixirRegen = calculateElixirRegen(gs.phase, deltaMs)
      const enemyElixirRegen = calculateElixirRegen(gs.phase, deltaMs)
      
      gs.playerElixir = Math.min(ELIXIR_MAX, gs.playerElixir + playerElixirRegen)
      gs.enemyElixir = Math.min(ELIXIR_MAX, gs.enemyElixir + enemyElixirRegen)

      // FREEZE EFFECT UPDATE - Decrement freeze duration
      gs.playerTroops.forEach(u => { if (u.frozen) u.frozen = Math.max(0, u.frozen - deltaMs) })
      gs.enemyTroops.forEach(u => { if (u.frozen) u.frozen = Math.max(0, u.frozen - deltaMs) })

      // MOVEMENT PHASE - All units move simultaneously toward targets
      ;[
        { units: gs.playerTroops, enemies: { troops: gs.enemyTroops, buildings: gs.enemyBuildings }, enemyTowers: towers.enemy, isPlayer: true },
        { units: gs.enemyTroops, enemies: { troops: gs.playerTroops, buildings: gs.playerBuildings }, enemyTowers: towers.player, isPlayer: false },
      ].forEach(({ units, enemies, enemyTowers, isPlayer }) => {
        units.forEach(unit => {
          if (!unit || unit.hp <= 0 || (unit.frozen && unit.frozen > 0)) return

          const speed = (unit.card.stats.speed || 1) * (deltaMs / 33)
          const movTarget = findMovementTarget(unit, enemies, Object.values(enemyTowers))
          if (movTarget) {
            moveUnit(unit, movTarget.x, movTarget.y, speed)
          } else {
            // Fallback: advance toward enemy base if all towers gone
            const targetY = isPlayer ? 0 : ARENA_HEIGHT
            moveUnit(unit, unit.x, targetY, speed)
          }
        })
      })

      // SIMULTANEOUS COMBAT: All units attack at the same time
      const processCombatRound = (gs, towers, nowMs) => {
        gs.playerTroops.forEach(unit => {
          if (!unit || unit.hp <= 0 || (unit.frozen && unit.frozen > 0)) return
          const target = findNearestEnemy(unit, { troops: gs.enemyTroops, buildings: gs.enemyBuildings }, Object.values(towers.enemy))
          if (target && Math.hypot((target.x || 0) - (unit.x || 0), (target.y || 0) - (unit.y || 0)) < (unit.card.stats.range || 100)) {
            const cooldown = 1000 / (unit.card.stats.attackSpeed || 1)
            if (nowMs - unit.lastAttackTime >= cooldown) {
              target.hp = Math.max(0, target.hp - (unit.card.stats.damage || 50))
              unit.lastAttackTime = nowMs
            }
          }
        })

        gs.enemyTroops.forEach(unit => {
          if (!unit || unit.hp <= 0 || (unit.frozen && unit.frozen > 0)) return
          const target = findNearestEnemy(unit, { troops: gs.playerTroops, buildings: gs.playerBuildings }, Object.values(towers.player))
          if (target && Math.hypot((target.x || 0) - (unit.x || 0), (target.y || 0) - (unit.y || 0)) < (unit.card.stats.range || 100)) {
            const cooldown = 1000 / (unit.card.stats.attackSpeed || 1)
            if (nowMs - unit.lastAttackTime >= cooldown) {
              target.hp = Math.max(0, target.hp - (unit.card.stats.damage || 50))
              unit.lastAttackTime = nowMs
            }
          }
        })

        // BUILDING COMBAT - Auto-attack with splash damage support
        gs.playerBuildings.forEach(b => {
          if (!b || b.hp <= 0) return
          const enemies = gs.enemyTroops.filter(t => Math.hypot(t.x - b.x, t.y - b.y) < (b.card.stats.range || 100))
          if (enemies.length > 0) {
            const cooldown = 1000 / (b.card.stats.attackSpeed || 1)
            if (nowMs - b.lastAttackTime >= cooldown) {
              const target = enemies[0]
              const damage = b.card.stats.damage || 50
              target.hp = Math.max(0, target.hp - damage)
              
              // Apply splash damage to nearby units
              if (b.card.stats.splashRadius) {
                enemies.forEach(e => {
                  if (Math.hypot(e.x - target.x, e.y - target.y) < b.card.stats.splashRadius) {
                    e.hp = Math.max(0, e.hp - (damage * 0.6))
                  }
                })
              }
              b.lastAttackTime = nowMs
            }
          }
        })

        gs.enemyBuildings.forEach(b => {
          if (!b || b.hp <= 0) return
          const enemies = gs.playerTroops.filter(t => Math.hypot(t.x - b.x, t.y - b.y) < (b.card.stats.range || 100))
          if (enemies.length > 0) {
            const cooldown = 1000 / (b.card.stats.attackSpeed || 1)
            if (nowMs - b.lastAttackTime >= cooldown) {
              const target = enemies[0]
              const damage = b.card.stats.damage || 50
              target.hp = Math.max(0, target.hp - damage)
              
              // Apply splash damage to nearby units
              if (b.card.stats.splashRadius) {
                enemies.forEach(e => {
                  if (Math.hypot(e.x - target.x, e.y - target.y) < b.card.stats.splashRadius) {
                    e.hp = Math.max(0, e.hp - (damage * 0.6))
                  }
                })
              }
              b.lastAttackTime = nowMs
            }
          }
        })
      }

      // SIMULTANEOUS COMBAT SYSTEM - All units attack at same time
      processCombatRound(gs, towers, nowMs)

      // TOWER ATTACKS - Defend against enemy units (automatic)
      const towerAttack = (tower, troops) => {
        if (tower.hp <= 0) return
        const range = 150
        const targets = troops.filter(t => Math.hypot(t.x - tower.x, t.y - tower.y) < range && t.hp > 0)
        if (targets.length > 0) {
          const target = targets[0]
          const attackCooldown = 1250
          if (nowMs - tower.lastAttackTime >= attackCooldown) {
            target.hp = Math.max(0, target.hp - 150)
            tower.lastAttackTime = nowMs
          }
        }
      }

      Object.values(towers.player).forEach(tower => {
        if (tower) towerAttack(tower, gs.enemyTroops)
      })
      Object.values(towers.enemy).forEach(tower => {
        if (tower) towerAttack(tower, gs.playerTroops)
      })

      // CLEANUP DEAD UNITS - Remove units with HP <= 0 (Death Handling)
      gs.playerTroops = gs.playerTroops.filter(u => u && u.hp > 0)
      gs.enemyTroops = gs.enemyTroops.filter(u => u && u.hp > 0)
      gs.playerBuildings = gs.playerBuildings.filter(u => u && u.hp > 0)
      gs.enemyBuildings = gs.enemyBuildings.filter(u => u && u.hp > 0)

      // PERFORMANCE OPTIMIZATION - Keep unit count under 50 per side for 30fps stability
      if (gs.playerTroops.length + gs.playerBuildings.length > 50) {
        const excess = gs.playerTroops.length + gs.playerBuildings.length - 50
        gs.playerTroops.splice(0, Math.min(excess, gs.playerTroops.length))
      }
      if (gs.enemyTroops.length + gs.enemyBuildings.length > 50) {
        const excess = gs.enemyTroops.length + gs.enemyBuildings.length - 50
        gs.enemyTroops.splice(0, Math.min(excess, gs.enemyTroops.length))
      }

      // CHECK WIN CONDITIONS
      if (towers.player.kingTower.hp <= 0) { gs.gameOver = true; gs.winner = 'enemy' }
      if (towers.enemy.kingTower.hp <= 0) { gs.gameOver = true; gs.winner = 'player' }

      botPlayCard()

      const cycleIndex = gs.playerHand.length > 0 ? (gs.playerHand.length - 1) % 8 : null
      setCycledCard(cycleIndex === 0 ? 0 : null)

      // UPDATE UI STATE with current game stats
      setGameStats({
        playerElixir: Math.floor(gs.playerElixir * 10) / 10,
        enemyElixir: Math.floor(gs.enemyElixir * 10) / 10,
        gameTimeRemainingSec: Math.floor(gs.gameTimeRemainingSec),

        playerHPBars: gs.playerTroops.map(u => ({ id: u.id, hp: u.hp, maxHp: u.card.stats.hp, x: u.x, y: u.y })),
        playerBuildingBars: gs.playerBuildings.map(b => ({ id: b.id, hp: b.hp, maxHp: b.card.stats.hp, x: b.x, y: b.y })),
        enemyHPBars: gs.enemyTroops.map(u => ({ id: u.id, hp: u.hp, maxHp: u.card.stats.hp, x: u.x, y: u.y })),
        enemyBuildingBars: gs.enemyBuildings.map(b => ({ id: b.id, hp: b.hp, maxHp: b.card.stats.hp, x: b.x, y: b.y })),
      })

      setUiState(prev => prev + 1)
    }, 33) // 30fps for smooth gameplay

    return () => {

            <div className="flex gap-1 items-center"><span className="text-lg">❤️</span><span className="text-sm font-bold">{Math.max(0, Math.floor(towers.enemy.kingTower.hp))}</span></div>
            <div className="flex gap-1 items-center"><span className="text-lg">🏰</span><span className="text-sm font-bold">{Math.max(0, Math.floor(towers.enemy.princessLeft.hp))}</span></div>
            <div className="flex gap-1 items-center"><span className="text-lg">🏰</span><span className="text-sm font-bold">{Math.max(0, Math.floor(towers.enemy.princessRight.hp))}</span></div>
          </div>

          {/* Timer with Phase Indicator */}
          <div className="flex flex-col items-center gap-1">
            <div className={`timer-display ${getTimerClass()}`}>
              {gameStats.formattedTime}
            </div>
            <div className={`phase-badge ${gameStats.phase}`}>
              {gameStats.phase === 'early' && '⏱️ Early'}
              {gameStats.phase === 'mid' && '⚡ Mid'}
              {gameStats.phase === 'late' && '🔥 Late'}
            </div>
          </div>

          {/* Player Towers */}
          <div className="flex gap-3">
            <div className="flex gap-1 items-center"><span className="text-lg">❤️</span><span className="text-sm font-bold">{Math.max(0, Math.floor(towers.player.kingTower.hp))}</span></div>
            <div className="flex gap-1 items-center"><span className="text-lg">🏰</span><span className="text-sm font-bold">{Math.max(0, Math.floor(towers.player.princessLeft.hp))}</span></div>
            <div className="flex gap-1 items-center"><span className="text-lg">🏰</span><span className="text-sm font-bold">{Math.max(0, Math.floor(towers.player.princessRight.hp))}</span></div>
          </div>
        </div>

        <div className="flex justify-center">{renderArena()}</div>

        {/* Elixir Bar with Phase Info */}
        <div className="bg-gray-900 text-white p-3 flex items-center gap-3 border-x-2 border-yellow-600">
          <span className="text-sm font-bold w-12">Elixir</span>
          <div className="flex-1">
            <div className="bg-gray-800 rounded h-6 border-2 border-purple-500 relative overflow-hidden">
              <div className="h-full bg-gradient-to-r from-purple-600 to-purple-400 transition-all" style={{ width: `${(gameStats.playerElixir / ELIXIR_MAX) * 100}%` }} />
              <span className="absolute inset-0 flex items-center justify-center text-white text-xs font-bold">{Math.floor(gameStats.playerElixir)}/{ELIXIR_MAX}</span>
            </div>
            <div className={`elixir-regen-text ${getElixirRegenClass()}`}>
              Regen: {getElixirRegenText()} ({gameStats.phase.toUpperCase()})
            </div>
          </div>
        </div>

        {/* Clash Royale Hand Container */}
        <div className="hand-container">
          {/* Next card preview - left side, small */}
          {gs.playerDeck && gs.playerDeck.length > 0 && (() => {
            const nextIdx = (gs.playerNextDeckIdx ?? gs.playerHand.length) % gs.playerDeck.length
            const nextCard = CARDS[gs.playerDeck[nextIdx]]
            if (!nextCard) return null
            return (
              <div className={`next-card-preview rarity-${nextCard.rarity}`}
                title={`Next: ${nextCard.name} (${nextCard.elixirCost}⚡)`}
                style={{ borderColor: rarityBorderColors[nextCard.rarity] || '#FFD700' }}>
                <span className="hand-card-emoji">{nextCard.emoji}</span>
                <div className="hand-card-cost">
                  <span>{nextCard.elixirCost}</span>
                  <span style={{ fontSize: '9px' }}>⚡</span>
                </div>
              </div>
            )
          })()}

          {/* 4 main hand cards */}
          <div className="hand-cards-row">
            {gs.playerHand.slice(0, 4).map((handItem, idx) => {
              if (!handItem || !handItem.cardId || !CARDS[handItem.cardId]) return null
              const card = CARDS[handItem.cardId]
              const canPlay = gameStats.playerElixir >= card.elixirCost && !gs.gameOver
              const isDragging = dragState.dragging === handItem.id

              return (
                <div
                  key={handItem.id}
                  draggable={canPlay}
                  onDragStart={(e) => handleCardDragStart(e, handItem, card)}
                  onDragEnd={(e) => handleCardDragEnd(e)}
                  onMouseDown={(e) => {
                    if (canPlay && e.button === 0) {
                      handleCardMouseDown(e, handItem)
                    }
                  }}
                  onClick={() => {
                    if (canPlay) {
                      setDragState({
                        dragging: null,
                        ghostPos: { x: 0, y: 0 },
                        dropZoneValid: null,
                        ghostCard: card,
                        placementMode: handItem.id
                      })
                    }
                  }}
                  className={`hand-card ${canPlay ? 'can-play' : 'cannot-play'} ${isDragging ? 'dragging' : ''} rarity-${card.rarity}`}
                  style={{
                    borderColor: isDragging ? 'rgba(147, 51, 234, 0.8)' : rarityBorderColors[card.rarity] || '#E8D5B7',
                    cursor: canPlay ? 'grab' : 'not-allowed',
                    opacity: isDragging ? 0.4 : 1,
                    filter: isDragging ? 'grayscale(100%) brightness(0.7)' : 'brightness(1)',
                    transform: isDragging ? 'scale(0.95)' : 'scale(1)',
                    position: 'relative',
                  }}
                >
                  <div className="hand-card-rarity" style={{
                    borderColor: rarityBorderColors[card.rarity],
                    backgroundColor: rarityColors[card.rarity],
                    color: card.rarity === 'legendary' ? '#000' : '#fff',
                    opacity: 0.95,
                  }}>
                    {'⭐'}
                  </div>

                  <span className="hand-card-emoji">{card.emoji}</span>

                  <div className="hand-card-name">{card.name.length > 8 ? card.name.slice(0, 7) + '.' : card.name}</div>

                  <div className="hand-card-cost">
                    <span>{card.elixirCost}</span>
                    <span style={{ fontSize: '10px' }}>⚡</span>
                  </div>
                </div>
              )
            })}
          </div>
        </div>
        
        {/* Drag Ghost */}
        {dragState.dragging && dragState.ghostCard && (
          <div
            className="drag-ghost drag-float"
            style={{
              left: `${dragState.ghostPos.x - 45}px`,
              top: `${dragState.ghostPos.y - 50}px`,
              width: '90px',
              padding: '10px',
              borderRadius: '10px',
              border: '2px solid rgba(147, 51, 234, 0.8)',
              background: `linear-gradient(135deg, rgba(55, 65, 81, 0.95) 0%, rgba(31, 41, 55, 0.98) 100%)`,
              boxShadow: '0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(147, 51, 234, 0.6)',
              textAlign: 'center',
              zIndex: 1000,
              pointerEvents: 'none',
            }}
          >
            <div style={{ fontSize: '28px', marginBottom: '4px' }}>{dragState.ghostCard.emoji}</div>
            <div style={{
              fontSize: '10px',
              fontWeight: '700',
              color: '#fff',
              textTransform: 'uppercase',
              letterSpacing: '0.5px',
              marginBottom: '3px'
            }}>
              {dragState.ghostCard.name.length > 8 ? dragState.ghostCard.name.slice(0, 7) + '.' : dragState.ghostCard.name}
            </div>
            <div style={{ fontSize: '11px', fontWeight: '800', color: '#FCD34D' }}>
              {dragState.ghostCard.elixirCost}⚡
            </div>
          </div>
        )}
      </div>
    )
  }

  if (screen === 'menu') {
    return (
      <div className="flex flex-col items-center justify-center min-h-screen text-white p-4">
        <div className="text-6xl font-bold mb-4 text-yellow-400 float">⚔️ Clash Royale</div>
        <div className="text-2xl mb-8 text-gray-300">Premium Architecture Edition</div>
        <div className="mb-6"><p className="text-lg mb-4">Select Difficulty:</p><div className="flex gap-4">
          {['easy', 'medium', 'hard'].map(diff => <button key={diff} onClick={() => setDifficulty(diff)} className={`px-6 py-3 rounded-lg font-bold transition-all ${difficulty === diff ? 'bg-yellow-500 text-black scale-110 pulse-glow' : 'bg-gray-700 text-white hover:bg-gray-600'}`}>{diff.toUpperCase()}</button>)}
        </div></div>
        <button onClick={() => { setSelectedDeck([]); setScreen('deckBuilder') }} className="px-8 py-4 bg-gradient-to-r from-green-500 to-green-600 text-white font-bold text-lg rounded-lg hover:shadow-lg hover:scale-105 transition-all">Build Deck</button>
      </div>
    )
  }

  if (screen === 'deckBuilder') {
    return (
      <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-gray-900 to-black text-white p-4 overflow-y-auto">
        <h1 className="text-4xl font-bold mb-2 text-yellow-400">Build Your Deck</h1>
        <p className="text-lg mb-6">Select exactly 8 cards (Current: {selectedDeck.length}/8)</p>
        <div className="mb-6 text-center"><p className="text-lg">Average Elixir: {selectedDeck.length > 0 ? (selectedDeck.reduce((sum, cardId) => sum + CARDS[cardId].elixirCost, 0) / selectedDeck.length).toFixed(1) : 0}</p></div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 max-w-4xl">
          {CARD_ARRAY.map(card => {
            const isSelected = selectedDeck.includes(card.id)
            return (
              <button key={card.id} onClick={() => { if (isSelected) setSelectedDeck(selectedDeck.filter((cid, idx) => !(cid === card.id && selectedDeck.indexOf(cid) === idx))); else if (selectedDeck.length < 8) setSelectedDeck([...selectedDeck, card.id]) }}
                className={`p-3 rounded-lg border-2 transition-all card-spawn ${isSelected ? `border-yellow-400 shadow-lg scale-105 rarity-${card.rarity}` : `border-gray-600 bg-gray-800 hover:border-gray-400 rarity-${card.rarity}`}`}>
                <div className="text-3xl mb-2">{card.emoji}</div>
                <div className="text-xs font-bold">{card.name}</div>
                <div className="text-xs text-yellow-300">{card.elixirCost}⚡</div>
                <div className="text-xs text-gray-400">{card.type}</div>
              </button>
            )
          })}
        </div>
        <div className="flex gap-4">
          <button onClick={() => { setSelectedDeck([]); setScreen('menu') }} className="px-6 py-3 bg-gray-700 text-white font-bold rounded-lg hover:bg-gray-600 transition-all">Back</button>
          <button onClick={() => { if (selectedDeck.length === 8) { initializeGame(); setScreen('battle') } }} disabled={selectedDeck.length !== 8} className={`px-8 py-3 font-bold rounded-lg transition-all ${selectedDeck.length === 8 ? 'bg-gradient-to-r from-green-500 to-green-600 text-white hover:shadow-lg hover:scale-105 cursor-pointer' : 'bg-gray-600 text-gray-400 cursor-not-allowed opacity-50'}`}>Start Battle</button>
        </div>
      </div>
    )
  }

  if (screen === 'battle') {
    if (gameStateRef.current.gameOver) {
      const gs = gameStateRef.current
      const towers = towerStateRef.current
      const playerTowerHp = Object.values(towers.player).reduce((sum, t) => sum + t.hp, 0)
      const enemyTowerHp = Object.values(towers.enemy).reduce((sum, t) => sum + t.hp, 0)
      const actualWinner = enemyTowerHp < playerTowerHp ? 'player' : enemyTowerHp > playerTowerHp ? 'enemy' : 'tie'

      return (
        <div className="flex flex-col items-center justify-center min-h-screen text-white p-4">
          <div className={`text-5xl font-bold mb-4 victory-popup ${actualWinner === 'player' ? 'text-green-400' : actualWinner === 'tie' ? 'text-yellow-400' : 'text-red-400'}`}>
            {actualWinner === 'player' ? victoryMessages[Math.floor(Math.random() * victoryMessages.length)] : actualWinner === 'tie' ? '⚔️ Tied Battle!' : defeatMessages[Math.floor(Math.random() * defeatMessages.length)]}
          </div>
          <div className="text-2xl mb-6">Your Towers: {Math.max(0, Math.floor(playerTowerHp))} HP<br />Enemy Towers: {Math.max(0, Math.floor(enemyTowerHp))} HP</div>
          <button onClick={() => setScreen('menu')} className="px-8 py-4 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-bold text-lg rounded-lg hover:shadow-lg hover:scale-105 transition-all">Play Again</button>
        </div>
      )
    }

    return (
      <div className="flex flex-col items-center justify-center min-h-screen text-white p-4">
        {renderUI()}
      </div>
    )
  }

  return null
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ClashRoyaleGame />);
  </script>
</body>
</html>
