const MatchHistoryManager = {
  save: (matchData) => {
    try {
      let history = JSON.parse(localStorage.getItem('clashRoyaleHistory') || '[]')
      history.unshift({
        id: Date.now(),
        timestamp: new Date().toISOString(),
        ...matchData,
      })
      history = history.slice(0, 50) // Keep last 50 matches
      localStorage.setItem('clashRoyaleHistory', JSON.stringify(history))
    } catch (e) {
      console.error('Failed to save match history:', e)
    }
  },
  
  load: () => {
    try {
      return JSON.parse(localStorage.getItem('clashRoyaleHistory') || '[]')
    } catch {
      return []
    }
  },
  
  getStats: () => {
    const history = MatchHistoryManager.load()
    const stats = {
      totalMatches: history.length,
      wins: history.filter(m => m.result === 'win').length,
      losses: history.filter(m => m.result === 'loss').length,
      ties: history.filter(m => m.result === 'tie').length,
      avgDuration: history.length > 0
        ? (history.reduce((sum, m) => sum + m.duration, 0) / history.length).toFixed(1)
        : 0,
      winRate: history.length > 0
        ? ((history.filter(m => m.result === 'win').length / history.length) * 100).toFixed(1)
        : 0,
    }
    return stats
  },
}

const AIEngine = {
  // Decision tree for card selection
  selectCard: (hand, elixir, gameState, difficulty, memory) => {
    const playableCards = hand.filter(h => CARDS[h.cardId].elixirCost <= elixir)
    if (playableCards.length === 0) return null

    let selectedCard = playableCards[0]

    if (difficulty === 'hard') {
      // Position-aware deployment
      const defendingCards = playableCards.filter(c => CARDS[c.cardId].type === 'building')
      const offensiveCards = playableCards.filter(c => CARDS[c.cardId].stats.speed >= 1)

      // Elixir banking strategy
      if (elixir >= 8 && offensiveCards.length > 0) {
        // Go aggressive when high elixir
        const highDamage = offensiveCards.filter(c => CARDS[c.cardId].stats.damage >= 100)
        selectedCard = highDamage.length > 0 ? highDamage[0] : offensiveCards[0]
      } else if (gameState.incomingThreat && defendingCards.length > 0) {
        // Defend if threat detected
        selectedCard = defendingCards[0]
      } else {
        // Rotation patterns - cycle through deck
        selectedCard = memory.lastPlayedIndex !== undefined
          ? playableCards[(memory.lastPlayedIndex + 1) % playableCards.length]
          : playableCards[Math.floor(Math.random() * playableCards.length)]
      }
    }

    return selectedCard
  },

  // Learn from player behavior
  analyzePlayerPattern: (playerHistory, currentMatch) => {
    if (playerHistory.length < 3) return null

    const avgCardCost = playerHistory.reduce((sum, m) => sum + m.deckAvgCost, 0) / playerHistory.length
    const preferredCardTypes = {}
    
    playerHistory.forEach(match => {
      if (match.usedCards) {
        match.usedCards.forEach(cardId => {
          const type = CARDS[cardId]?.type
          preferredCardTypes[type] = (preferredCardTypes[type] || 0) + 1
        })
      }
    })

    return { avgCardCost, preferredCardTypes }
  },
}

const RenderOptimizer = {
  // Batch DOM updates
  scheduleUpdate: (() => {
    let scheduled = false
    let updateFn = null
    
    return (fn) => {
      updateFn = fn
      if (!scheduled) {
        scheduled = true
        requestAnimationFrame(() => {
          updateFn && updateFn()
          scheduled = false
        })
      }
    }
  })(),

  // Memoize expensive computations
  memoize: (fn) => {
    const cache = new Map()
    return (...args) => {
      const key = JSON.stringify(args)
      if (cache.has(key)) return cache.get(key)
      const result = fn(...args)
      cache.set(key)
      return result
    }
  },
}

const findNearestEnemy = (unit, enemies, towers) => {
  let nearest = null
  let minDist = Infinity
  const range = unit.stats.range || 100

  if (unit.stats.targetBuildings && enemies.buildings) {
    enemies.buildings.forEach(building => {
      const dist = Math.hypot(building.x - unit.x, building.y - unit.y)
      if (dist < range && dist < minDist) {
        nearest = building
        minDist = dist
      }
    })
  }

  if (unit.stats.targetBuildings && towers) {
    towers.forEach(tower => {
      if (tower.hp > 0) {
        const dist = Math.hypot(tower.x - unit.x, tower.y - unit.y)
        if (dist < range && dist < minDist) {
          nearest = tower
          minDist = dist
        }
      }
    })
  }

  if (enemies.troops) {
    enemies.troops.forEach(troop => {
      if (troop.hp > 0) {
        const dist = Math.hypot(troop.x - unit.x, troop.y - unit.y)
        if (dist < range && dist < minDist) {
          nearest = troop
          minDist = dist
        }
      }
    })
  }

  return nearest
}

// Improved pathfinding - avoid crowded areas
const moveUnitOptimized = (unit, targetX, targetY, speed = 1, otherUnits = []) => {
  const dist = Math.hypot(targetX - unit.x, targetY - unit.y)
  if (dist < speed) {
    unit.x = targetX
    unit.y = targetY
    return true
  }

  // Avoid crowded areas
  const crowdRepulsion = otherUnits
    .filter(u => u.id !== unit.id)
    .filter(u => Math.hypot(u.x - unit.x, u.y - unit.y) < 50)
    .reduce((acc, u) => {
      const angle = Math.atan2(unit.y - u.y, unit.x - u.x)
      return { 
        x: acc.x + Math.cos(angle) * 2, 
        y: acc.y + Math.sin(angle) * 2 
      }
    }, { x: 0, y: 0 })

  let finalX = targetX + crowdRepulsion.x
  let finalY = targetY + crowdRepulsion.y
  
  const finalDist = Math.hypot(finalX - unit.x, finalY - unit.y)
  const ratio = Math.min(speed / finalDist, 1)
  
  unit.x += (finalX - unit.x) * ratio
  unit.y += (finalY - unit.y) * ratio
  return false
}

  })
  const [spellZonePreview, setSpellZonePreview] = useState(null)

  // Play sound effect
  const playSound = useCallback((type) => {
    if (!gameSettings.soundEnabled) return
    
    const audioContext = new (window.AudioContext || window.webkitAudioContext)()
    const oscillator = audioContext.createOscillator()
    const gainNode = audioContext.createGain()
    
    oscillator.connect(gainNode)
    gainNode.connect(audioContext.destination)
    
    switch (type) {
      case 'card-play':
        oscillator.frequency.value = 800
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime)
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1)
        break
      case 'spell':
        oscillator.frequency.value = 1200
        gainNode.gain.setValueAtTime(0.2, audioContext.currentTime)
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3)
        break
      case 'damage':
        oscillator.frequency.value = 400
        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime)
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15)
        break
    }
    
    oscillator.start(audioContext.currentTime)
    oscillator.stop(audioContext.currentTime + 0.3)
  }, [gameSettings.soundEnabled])

  // Handle spell targeting
  const handleSpellCast = useCallback((cardId, x, y) => {
    const gs = gameStateRef.current
    const card = CARDS[cardId]
    if (card.type !== 'spell') return

    // Show spell zone
    setSpellZonePreview({ x, y, radius: card.stats.splashRadius })
    setTimeout(() => setSpellZonePreview(null), 600)

    playSound('spell')
  }, [playSound])

  // Card preview on hover
  const handleCardHover = useCallback((cardId, e) => {
    const card = CARDS[cardId]
    if (!card) return

    setShowCardPreview(cardId)
    const rect = e.currentTarget.getBoundingClientRect()
    setPreviewPos({
      x: rect.left + rect.width / 2,
      y: rect.top - 10,
    })
  }, [])

  const playCard = useCallback((cardId, isPlayer = true) => {
    const gs = gameStateRef.current
    const card = CARDS[cardId]
    if (!card) return

    const elixir = isPlayer ? gs.playerElixir : gs.enemyElixir
    if (elixir < card.elixirCost) return

    if (isPlayer) {
      gs.playerElixir -= card.elixirCost
      gs.usedCards.push(cardId)
      playSound('card-play')
    } else {
      gs.enemyElixir -= card.elixirCost
    }

    const hand = isPlayer ? gs.playerHand : gs.enemyHand
    const handIdx = hand.findIndex(h => h.cardId === cardId)
    if (handIdx >= 0) hand.splice(handIdx, 1)

    // Spell handling with improved targeting
    if (card.type === 'spell') {
      const side = isPlayer ? 'enemy' : 'player'
      const targetTroops = side === 'enemy' ? gs.enemyTroops : gs.playerTroops
      const targetBuildings = side === 'enemy' ? gs.enemyBuildings : gs.playerBuildings

      // Smart spell targeting - target center of mass
      const allTargets = [...targetTroops, ...targetBuildings]
      let centerX = isPlayer ? ARENA_WIDTH * 0.75 : ARENA_WIDTH * 0.25
      let centerY = isPlayer ? ARENA_HEIGHT * 0.3 : ARENA_HEIGHT * 0.7

      if (allTargets.length > 0) {
        centerX = allTargets.reduce((sum, t) => sum + t.x, 0) / allTargets.length
        centerY = allTargets.reduce((sum, t) => sum + t.y, 0) / allTargets.length
      }

      const splashRadius = card.stats.splashRadius || 100

      if (cardId === 'fireball') {
        targetTroops.forEach(troop => {
          const dist = Math.hypot(troop.x - centerX, troop.y - centerY)
          if (dist < splashRadius) {
            troop.hp -= card.stats.damage
            playSound('damage')
          }
        })
        targetBuildings.forEach(building => {
          const dist = Math.hypot(building.x - centerX, building.y - centerY)
          if (dist < splashRadius) {
            building.hp -= card.stats.damage
          }
        })
      } else if (cardId === 'arrows') {
        targetTroops.forEach(troop => {
          const dist = Math.hypot(troop.x - centerX, troop.y - centerY)
          if (dist < splashRadius) {
            troop.hp -= card.stats.damage
            playSound('damage')
          }
        })
      } else if (cardId === 'freeze') {
        gs.freezeZones.push({
          x: centerX,
          y: centerY,
          radius: splashRadius,
          duration: 2000,
          side: side,
        })
        targetTroops.forEach(troop => {
          const dist = Math.hypot(troop.x - centerX, troop.y - centerY)
          if (dist < splashRadius) {
            troop.frozen = 2000
          }
        })
      }
    } else {
      // Troop/building deployment with zone awareness
      const troops = isPlayer ? gs.playerTroops : gs.enemyTroops
      const buildings = isPlayer ? gs.playerBuildings : gs.enemyBuildings

      let spawnX = isPlayer ? LANE_WIDTH / 2 : LANE_WIDTH + LANE_WIDTH / 2
      let spawnY = isPlayer ? ARENA_HEIGHT - 200 : 200

        spawnX = zone.x + (Math.random() - 0.5) * zone.width
        spawnY = zone.y + (Math.random() - 0.5) * zone.height
      }

      if (card.type === 'building') {
        buildings.push({
          id: Math.random(),
          cardId: cardId,
          card: card,
          x: spawnX,
          y: spawnY,
          hp: card.stats.hp || 500,
          lastAttackTime: 0,
          isPlayer: isPlayer,
        })
      } else {
        const count = card.stats.count || 1
        for (let i = 0; i < count; i++) {
          const offsetX = (Math.random() - 0.5) * 80
          const offsetY = (Math.random() - 0.5) * 40
          troops.push({
            id: Math.random(),
            cardId: cardId,
            card: card,
            x: spawnX + offsetX,
            y: spawnY + offsetY,
            hp: card.stats.hp || 100,
            targetId: null,
            lastAttackTime: 0,
            isPlayer: isPlayer,
          })
        }
      }
    }

    if (difficulty === 'medium') playInterval = 4000
    if (difficulty === 'hard') playInterval = 2500

    if (now - gs.lastCardPlayTime.enemy < playInterval) return

    const gameState = {
      incomingThreat: gs.playerTroops.length > 0,
    }

    const selectedCard = AIEngine.selectCard(
      hand,
      gs.enemyElixir,
      gameState,
      difficulty,
      aiMemoryRef.current
    )

    if (selectedCard && CARDS[selectedCard.cardId].elixirCost <= gs.enemyElixir) {
      playCard(selectedCard.cardId, false)
      gs.lastCardPlayTime.enemy = now
      aiMemoryRef.current.lastPlayedIndex = hand.indexOf(selectedCard)

      const towers = towerStateRef.current

      if (gs.gameOver) return

      gs.gameTime -= 33
      if (gs.gameTime <= 0) {
        gs.gameTime = 0
        gs.gameOver = true
        const playerTowerHp = Object.values(towers.player).reduce((sum, t) => sum + t.hp, 0)
        const enemyTowerHp = Object.values(towers.enemy).reduce((sum, t) => sum + t.hp, 0)
        gs.winner = enemyTowerHp < playerTowerHp ? 'player' : enemyTowerHp > playerTowerHp ? 'enemy' : 'tie'
      }

      const doubleElixir = gs.gameTime < 60000
      const elixirRegen = doubleElixir ? 0.03 : 0.015

      gs.playerElixir = Math.min(10, gs.playerElixir + elixirRegen)
      gs.enemyElixir = Math.min(10, gs.enemyElixir + elixirRegen)

      // Dead unit filtering - optimized
      gs.playerTroops = gs.playerTroops.filter(u => u.hp > 0)
      gs.enemyTroops = gs.enemyTroops.filter(u => u.hp > 0)
      gs.playerBuildings = gs.playerBuildings.filter(u => u.hp > 0)
      gs.enemyBuildings = gs.enemyBuildings.filter(u => u.hp > 0)

      gs.playerTroops.forEach(u => { if (u.frozen) u.frozen -= 33 })
      gs.enemyTroops.forEach(u => { if (u.frozen) u.frozen -= 33 })

      // Unit movement & combat with optimized pathfinding
      ;[
        { units: gs.playerTroops, enemies: { troops: gs.enemyTroops, buildings: gs.enemyBuildings }, enemyTowers: towers.enemy, allUnits: gs.playerTroops },
        { units: gs.enemyTroops, enemies: { troops: gs.playerTroops, buildings: gs.playerBuildings }, enemyTowers: towers.player, allUnits: gs.enemyTroops },
      ].forEach(({ units, enemies, enemyTowers, allUnits }) => {
        units.forEach(unit => {
          if (unit.frozen && unit.frozen > 0) return

          const target = findNearestEnemy(unit, enemies, Object.values(enemyTowers))
          if (target) {
            const dist = Math.hypot(target.x - unit.x, target.y - unit.y)
            const range = unit.card.stats.range || 100

            if (dist < range) {
              const now = Date.now()
              const attackSpeed = unit.card.stats.attackSpeed || 1
              if (now - unit.lastAttackTime > 1000 / attackSpeed) {
                const damage = unit.card.stats.damage || 50
                target.hp -= damage
                unit.lastAttackTime = now
              }
            } else {
              const speed = unit.card.stats.speed || 1
              moveUnitOptimized(unit, target.x, target.y, speed, allUnits)
            }
          } else {
            const targetY = unit.isPlayer ? 0 : ARENA_HEIGHT
            const speed = unit.card.stats.speed || 1
            moveUnitOptimized(unit, unit.x, targetY, speed * 0.5, allUnits)
          }
        })
      })

      // Building attacks
      ;[
        { buildings: gs.playerBuildings, enemies: { troops: gs.enemyTroops }, towers: towers.enemy },
        { buildings: gs.enemyBuildings, enemies: { troops: gs.playerTroops }, towers: towers.player },
      ].forEach(({ buildings, enemies, towers: enemyTowers }) => {
        buildings.forEach(building => {
          const targets = enemies.troops.filter(t => t.hp > 0)
          const range = building.card.stats.range || 100

          const nearest = targets.length > 0
            ? targets.reduce((closest, t) => {
                const d = Math.hypot(t.x - building.x, t.y - building.y)
                const dc = Math.hypot(closest.x - building.x, closest.y - building.y)
                return d < dc ? t : closest
              })
            : null

          if (nearest && Math.hypot(nearest.x - building.x, nearest.y - building.y) < range) {
            const now = Date.now()
            if (now - building.lastAttackTime > 1000 / (building.card.stats.attackSpeed || 1)) {
              const damage = building.card.stats.damage || 50
              nearest.hp -= damage
              if (building.card.stats.splashRadius) {
                targets.forEach(t => {
                  if (Math.hypot(t.x - nearest.x, t.y - nearest.y) < building.card.stats.splashRadius) {
                    t.hp -= damage * 0.6
                  }
                })
              }
              building.lastAttackTime = now
            }
          }
        })
      })

      // Tower attacks
      const towerAttack = (tower, troops) => {
        if (tower.hp <= 0) return
        const range = 150
        const targets = troops.filter(t => Math.hypot(t.x - tower.x, t.y - tower.y) < range && t.hp > 0)
        if (targets.length > 0) {
          const target = targets[0]
          const now = Date.now()
          if (now - tower.lastAttackTime > 1000) {
            target.hp -= 150
            tower.lastAttackTime = now
          }
        }
      }

      Object.values(towers.player).forEach(tower => towerAttack(tower, gs.enemyTroops))
      Object.values(towers.enemy).forEach(tower => towerAttack(tower, gs.playerTroops))

      if (towers.player.kingTower.hp <= 0) {
        gs.gameOver = true
        gs.winner = 'enemy'
      }
      if (towers.enemy.kingTower.hp <= 0) {
        gs.gameOver = true
        gs.winner = 'player'
      }

      botPlayCard()

      // Update UI - optimized
      setGameStats(prev => ({
        ...prev,
        playerElixir: Math.floor(gs.playerElixir * 10) / 10,
        enemyElixir: Math.floor(gs.enemyElixir * 10) / 10,
        gameTime: Math.max(0, Math.floor(gs.gameTime / 1000)),
        towers: {
          playerKing: towers.player.kingTower.hp,
          playerLeftPrincess: towers.player.princessLeft.hp,
          playerRightPrincess: towers.player.princessRight.hp,
          enemyKing: towers.enemy.kingTower.hp,
          enemyLeftPrincess: towers.enemy.princessLeft.hp,
          enemyRightPrincess: towers.enemy.princessRight.hp,
        },
        playerHPBars: gs.playerTroops.map(u => ({
          id: u.id,
          hp: u.hp,
          maxHp: u.card.stats.hp,
          x: u.x,
          y: u.y,
        })),
        playerBuildingBars: gs.playerBuildings.map(b => ({
          id: b.id,
          hp: b.hp,
          maxHp: b.card.stats.hp,
          x: b.x,
          y: b.y,
        })),
        enemyHPBars: gs.enemyTroops.map(u => ({
          id: u.id,
          hp: u.hp,
          maxHp: u.card.stats.hp,
          x: u.x,
          y: u.y,
        })),
        enemyBuildingBars: gs.enemyBuildings.map(b => ({
          id: b.id,
          hp: b.hp,
          maxHp: b.card.stats.hp,
          x: b.x,
          y: b.y,
        })),
        handState: CardCycleManager.getCurrentHandState(gs.playerHand),
      }))

      setUiState(prev => prev + 1)
    }, 33)

    return () => clearInterval(gameLoopInterval)
  }, [screen, botPlayCard])

          <p className="text-sm text-gray-400">Recommended: 3.5 - 4.5</p>
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 max-w-4xl">
          {CARD_ARRAY.map(card => {
            const selectedCount = selectedDeck.filter(cid => cid === card.id).length
            const isSelected = selectedCount > 0
            return (
              <button
                key={card.id}
                onClick={() => {
                  if (selectedCount > 0 && selectedDeck.length > 0) {
                    setSelectedDeck(selectedDeck.filter((cid, idx) => !(cid === card.id && selectedDeck.indexOf(cid) === idx)))
                  } else if (selectedCount < 2 && selectedDeck.length < 8) {
                    setSelectedDeck([...selectedDeck, card.id])
                  }
                }}
                className={`p-3 rounded-lg border-2 transition-all ${
                  isSelected
                    ? 'border-yellow-400 bg-gradient-to-b from-purple-600 to-purple-800 shadow-lg scale-105'
                    : 'border-gray-600 bg-gray-800 hover:border-gray-400'
                }`}
                onMouseEnter={(e) => handleCardHover(card.id, e)}
                onMouseLeave={() => setShowCardPreview(null)}
              >
                <div className="text-3xl mb-2">{card.emoji}</div>
                <div className="text-xs font-bold">{card.name}</div>
                <div className="text-xs text-yellow-300">{card.elixirCost} elixir</div>
                <div className="text-xs text-gray-400">{card.type}</div>
                {isSelected && <div className="text-xs text-yellow-400 mt-1">x{selectedCount}</div>}
              </button>
            )
          })}
        </div>

        <div className="flex gap-4">
          <button
            onClick={() => {
              setSelectedDeck([])
              setScreen('menu')
            }}
            className="px-6 py-3 bg-gray-700 text-white font-bold rounded-lg hover:bg-gray-600 transition-all"
          >
            Back
          </button>
          <button
            onClick={() => {
              if (selectedDeck.length === 8) {
                initializeGame()
                setScreen('battle')
              }
            }}
            disabled={selectedDeck.length !== 8}
            className={`px-8 py-3 font-bold rounded-lg transition-all ${
              selectedDeck.length === 8
                ? 'bg-gradient-to-r from-green-500 to-green-600 text-white hover:shadow-lg hover:scale-105 cursor-pointer'
                : 'bg-gray-600 text-gray-400 cursor-not-allowed opacity-50'
            }`}
          >
            Start Battle {selectedDeck.length === 8 ? '✓' : `(${selectedDeck.length}/8)`}
          </button>
        </div>

        {renderCardPreview()}
      </div>
    )
  }

  // Battle screen
  if (screen === 'battle') {
    if (gameStateRef.current.gameOver) {
      const gs = gameStateRef.current
      const towers = towerStateRef.current
      const playerTowerHp = Object.values(towers.player).reduce((sum, t) => sum + t.hp, 0)
      const enemyTowerHp = Object.values(towers.enemy).reduce((sum, t) => sum + t.hp, 0)
      const actualWinner = enemyTowerHp < playerTowerHp ? 'player' : enemyTowerHp > playerTowerHp ? 'enemy' : 'tie'

      // Save match to history
      useEffect(() => {
        MatchHistoryManager.save({
          result: actualWinner === 'player' ? 'win' : actualWinner === 'loss' ? 'loss' : 'tie',
          playerTowerHp,
          enemyTowerHp,
          duration: Math.floor((Date.now() - gs.startTime) / 1000),
          difficulty,
          deckSize: selectedDeck.length,
          usedCards: gs.usedCards,
          deckAvgCost: selectedDeck.length > 0 ? (selectedDeck.reduce((sum, cardId) => sum + CARDS[cardId].elixirCost, 0) / selectedDeck.length).toFixed(1) : 0,
        })
        setMatchStats(MatchHistoryManager.getStats())
      }, [])

      return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-gray-900 to-black text-white p-4">
          <div className={`text-5xl font-bold mb-4 ${actualWinner === 'player' ? 'text-green-400' : 'text-red-400'}`}>
            {actualWinner === 'player' ? '🎉 Victory!' : actualWinner === 'tie' ? '⚔️ Tie!' : '💀 Defeat!'}
          </div>
          <div className="text-2xl mb-6 text-center">
            Your Towers: {Math.max(0, Math.floor(playerTowerHp))} HP
            <br />
            Enemy Towers: {Math.max(0, Math.floor(enemyTowerHp))} HP
          </div>
          <button
            onClick={() => {
              setScreen('menu')
            }}
            className="px-8 py-4 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-bold text-lg rounded-lg hover:shadow-lg hover:scale-105 transition-all"
          >
            Play Again
          </button>
        </div>
      )
    }

    return (
      <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-gray-900 to-black text-white p-4 overflow-hidden">
        {renderUI()}
        {renderCardPreview()}
      </div>
    )
  }

  return null
}

const root = ReactDOM.createRoot(document.getElementById('root'))
root.render(<ClashRoyaleGameEnhanced />)
    </script>
  </body>
</html>
